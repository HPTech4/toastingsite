<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="card" aria-label="Romantic message">
            <p class="eyebrow">A soft invitation</p>
            <h1 id="text">You already know what I feel.</h1>
            <p class="subtext">For someone who means this much to me, the answer feels natural.</p>

            <div class="button-row">
                <button id="yes" class="btn btn-yes">Yes, always</button>
                <button id="no" class="btn btn-no">Not today</button>
            </div>

            <div class="effect-container" id="effect-container" aria-hidden="true"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
